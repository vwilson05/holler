name: WalkieTalkie
options:
  bundleIdPrefix: com.wilson
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: 6SULXSSZL7
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: "32"
    MARKETING_VERSION: "1.0"

targets:
  WalkieTalkie:
    type: application
    platform: iOS
    sources:
      - WalkieTalkie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wilson.holler
        INFOPLIST_FILE: WalkieTalkie/Info.plist
        CODE_SIGN_ENTITLEMENTS: WalkieTalkie/WalkieTalkie.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_DESTINATIONS: "iphone"
    dependencies:
      - target: HollerWatch
        embed: true

  HollerWatch:
    type: application
    platform: watchOS
    sources:
      - HollerWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wilson.holler.watchkitapp
        INFOPLIST_FILE: HollerWatch/Info.plist
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        TARGETED_DEVICE_FAMILY: "4"
        SDKROOT: watchos
        GENERATE_INFOPLIST_FILE: false
